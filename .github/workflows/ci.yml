name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - '28.1'
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - uses: astral-sh/setup-uv@v3

      - name: Byte-compile
        run: emacs -Q --batch --eval "(setq byte-compile-error-on-warn t)" -f batch-byte-compile ob-uv-python.el

      - name: Checkdoc
        run: |
          OUTPUT=$(emacs -Q --batch --eval "(checkdoc-file \"ob-uv-python.el\")" 2>&1)
          echo "$OUTPUT"
          test -z "$OUTPUT"

      - name: package-lint
        run: |
          emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(setq package-archives '((\"gnu\" . \"https://elpa.gnu.org/packages/\") (\"melpa\" . \"https://melpa.org/packages/\")))" \
            --eval "(package-initialize)" \
            --eval "(package-refresh-contents)" \
            --eval "(package-install 'package-lint)" \
            -l package-lint \
            -f package-lint-batch-and-exit \
            ob-uv-python.el

      - name: Run tests
        run: emacs -Q --batch -L . -l ert -l test/ob-uv-python-test.el -f ert-run-tests-batch-and-exit
